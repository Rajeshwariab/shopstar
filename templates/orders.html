{% extends "base.html" %}

{% block content %}
<h1>My Orders 📦</h1>

{% for order in orders %}

<div style="border:1px solid black; padding:15px; margin:10px; width:300px;">

<h3>{{ order.product.name }}</h3>

<p>Price: ₹{{ order.product.price }}</p>

<p>Quantity: {{ order.quantity }}</p>

<p>Total: ₹{{ order.total_price }}</p>

<p>Date: {{ order.created_at }}</p>

</div>

{% endfor %}
{% endblock %}
